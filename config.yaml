# Configuration file for video generation project

# Data path
data_path: "/data/lhy_data/video_data/UCF101/UCF-101"
train_split_path: "/data/lhy_data/video_data/UCF101/UCF101TrainTestSplits-RecognitionTask/ucfTrainTestlist/trainlist01.txt"
test_split_path: "/data/lhy_data/video_data/UCF101/UCF101TrainTestSplits-RecognitionTask/ucfTrainTestlist/testlist01.txt"

# Log and output paths
log_dir: "/data/lhy_data/video_generation/try/logs"
checkpoint_dir: "/data/lhy_data/video_generation/try/checkpoints"
sample_dir: "/data/lhy_data/video_generation/try/samples"
code_save_dir: "codes"
items_to_save: [
    {"type": "file", "path": "config.yaml"},
    {"type": "file", "path": "main.py"},
    {"type": "file", "path": "dataloader.py"},
    {"type": "dir", "path": "models"},
    {"type": "dir", "path": "tools"},
]

# Training parameters
batch_size: 1
epochs: 100
learning_rate: 1e-4
weight_decay: 1e-6

# Model parameters
dim: 64
dim_mults: [1, 2, 4, 8]
channels: 3
time_steps: 16  # frames
image_size: 64  # spatial resolution

# Diffusion parameters
timesteps: 1000
objective: "pred_x0"

# Reconstruction guidance
w_r: 10.0

